{% extends "base.html" %}
{% block title %}Edit Portfolio - AI Portfolio Builder{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="glass-card on-light fade-in-up">
        <h3 class="mb-4"><i class="fa-solid fa-pen-to-square text-primary me-2"></i>Edit Portfolio</h3>

        <form method="POST" action="{{ url_for('portfolio.edit_portfolio') }}">

            <!-- About -->
            <div class="mb-3">
                <label class="form-label fw-semibold">About Me</label>
                <textarea name="about" rows="3" class="form-control">{{ portfolio.about }}</textarea>
            </div>

            <!-- Career Objective -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Career Objective</label>
                <textarea name="career_objective" rows="3" class="form-control">{{ portfolio.career_objective }}</textarea>
            </div>

            <!-- Skills -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Technical Skills</label>
                    <input type="text" name="technical_skills" class="form-control"
                           value="{{ portfolio.skills.technical_skills | join(', ') }}"
                           placeholder="Comma separated, e.g. Python, SQL, Power BI">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Soft Skills</label>
                    <input type="text" name="soft_skills" class="form-control"
                           value="{{ portfolio.skills.soft_skills | join(', ') }}"
                           placeholder="Comma separated, e.g. Teamwork, Communication">
                </div>
            </div>

            <!-- Projects -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Projects</label>
                <div id="projectsContainer">
                    {% for project in portfolio.projects %}
                    <div class="row g-2 mb-2 project-row">
                        <div class="col-md-4">
                            <input type="text" name="project_title" class="form-control" value="{{ project.title }}" placeholder="Project title">
                        </div>
                        <div class="col-md-7">
                            <input type="text" name="project_description" class="form-control" value="{{ project.description }}" placeholder="Short description">
                        </div>
                        <div class="col-md-1">
                            <button type="button" class="btn btn-outline-danger btn-sm remove-project-btn">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <button type="button" id="addProjectBtn" class="btn btn-sm btn-outline-primary mt-2">
                    <i class="fa-solid fa-plus me-1"></i> Add Project
                </button>
            </div>

            <!-- Certificates -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Certificates</label>
                <input type="text" name="certificates" class="form-control"
                       value="{{ portfolio.certificates | join(', ') }}"
                       placeholder="Comma separated, e.g. AWS Cloud Practitioner, Google Data Analytics">
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('portfolio.preview_portfolio') }}" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left me-1"></i> Cancel
                </a>
                <button type="submit" class="btn btn-gradient">
                    <i class="fa-solid fa-floppy-disk me-1"></i> Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
