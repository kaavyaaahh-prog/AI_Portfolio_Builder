{% extends "base.html" %}
{% block title %}Login - AI Portfolio Builder{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-in-up">
        <div class="text-center mb-4">
            <i class="fa-solid fa-right-to-bracket fa-2x text-primary"></i>
            <h3 class="mt-2">Welcome Back</h3>
            <p class="text-muted">Login to continue building your portfolio</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
            </div>
            <div class="mb-2">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Your password" required>
            </div>

            <div class="d-flex justify-content-between align-items-center my-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember_me" id="rememberMe">
                    <label class="form-check-label small" for="rememberMe">Remember Me</label>
                </div>
                <a href="{{ url_for('auth.forgot_password') }}" class="small">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-gradient w-100">Login</button>
        </form>

        <p class="text-center mt-4 mb-0 text-muted">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
