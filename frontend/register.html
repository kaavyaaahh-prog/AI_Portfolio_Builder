{% extends "base.html" %}
{% block title %}Register - AI Portfolio Builder{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-in-up">
        <div class="text-center mb-4">
            <i class="fa-solid fa-user-plus fa-2x text-primary"></i>
            <h3 class="mt-2">Create Your Account</h3>
            <p class="text-muted">Join and start building your AI-powered portfolio</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Minimum 8 characters" minlength="8" required>
            </div>
            <div class="mb-2">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                       placeholder="Re-enter password" minlength="8" required>
            </div>
            <p id="passwordMatchWarning" class="text-danger small d-none mb-3">
                <i class="fa-solid fa-triangle-exclamation me-1"></i>Passwords do not match
            </p>

            <button type="submit" class="btn btn-gradient w-100 mt-2">Register</button>
        </form>

        <p class="text-center mt-4 mb-0 text-muted">
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
