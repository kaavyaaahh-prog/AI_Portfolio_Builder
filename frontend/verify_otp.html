{% extends "base.html" %}
{% block title %}Verify OTP - AI Portfolio Builder{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-in-up text-center">
        <i class="fa-solid fa-shield-halved fa-2x text-primary"></i>
        <h3 class="mt-2">Verify OTP</h3>
        <p class="text-muted">Enter the 6-digit code sent to your email (check the server console in dev mode)</p>

        <form method="POST" action="{{ url_for('auth.verify_otp') }}" class="mt-3">
            <div class="mb-4">
                <input type="text" id="otp" name="otp" class="form-control form-control-lg text-center"
                       placeholder="------" maxlength="6" pattern="\d{6}" required
                       style="letter-spacing: 8px; font-weight: 700;">
            </div>
            <button type="submit" class="btn btn-gradient w-100">Verify OTP</button>
        </form>

        <p class="text-muted small mt-4 mb-0">OTP expires in 5 minutes.</p>
    </div>
</div>
{% endblock %}
