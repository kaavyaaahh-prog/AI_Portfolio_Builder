{% extends "base.html" %}
{% block title %}Reset Password - AI Portfolio Builder{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-in-up">
        <div class="text-center mb-4">
            <i class="fa-solid fa-lock fa-2x text-primary"></i>
            <h3 class="mt-2">Reset Password</h3>
            <p class="text-muted">Choose a new password for your account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.reset_password') }}">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Minimum 8 characters" minlength="8" required>
            </div>
            <div class="mb-2">
                <label class="form-label">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                       placeholder="Re-enter new password" minlength="8" required>
            </div>
            <p id="passwordMatchWarning" class="text-danger small d-none mb-3">
                <i class="fa-solid fa-triangle-exclamation me-1"></i>Passwords do not match
            </p>

            <button type="submit" class="btn btn-gradient w-100 mt-2">Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
