{% extends "base.html" %}
{% block title %}Forgot Password - AI Portfolio Builder{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-in-up">
        <div class="text-center mb-4">
            <i class="fa-solid fa-key fa-2x text-primary"></i>
            <h3 class="mt-2">Forgot Password</h3>
            <p class="text-muted">Enter your registered email to receive an OTP</p>
        </div>

        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
            </div>
            <button type="submit" class="btn btn-gradient w-100">Send OTP</button>
        </form>

        <p class="text-center mt-4 mb-0 text-muted">
            Remembered your password?
            <a href="{{ url_for('auth.login') }}">Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
